<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <select id="translation-select">
        <option value="tovbsi">தமிழ் (TOVBSI)</option>
        <option value="niv">English (NIV)</option>
        <option value="amp">English (AMP)</option>
      </select>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="browse">Browse</button>
      <button class="tab-btn" data-tab="search">Search</button>
    </div>

    <div id="browse-tab" class="tab-content active">
      <div class="select-row">
        <select id="book-select">
          <option value="">Book</option>
        </select>
        <select id="chapter-select" disabled>
          <option value="">Chapter</option>
        </select>
        <select id="verse-select" disabled>
          <option value="">Verse</option>
        </select>
      </div>
      <div id="verse-display" class="verse-display"></div>
    </div>

    <div id="search-tab" class="tab-content">
      <div class="search-row">
        <input type="text" id="search-input" placeholder="e.g. John 3:16" autocomplete="off">
        <button id="search-btn">Go</button>
      </div>
      <div id="search-result" class="verse-display"></div>
    </div>

    <button id="copy-btn" class="copy-btn" disabled>Copy to Clipboard</button>

    <div id="toast" class="toast">Copied! Press Ctrl+V in Google Docs</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
