<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <svg class="header-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <path d="M12 6v7"/>
          <path d="M9 9h6"/>
        </svg>
        <span class="header-title">QuickVerse</span>
      </div>
      <div class="badge-wrapper">
        <div class="translation-badge" id="translation-badge">
          <span class="badge-text">தமிழ் (TOVBSI)</span>
          <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg>
        </div>
        <div class="dropdown-menu" id="dropdown-menu">
          <div class="dropdown-item selected" data-value="tovbsi">
            <span class="item-lang">தமிழ்</span>
            <span class="item-version">TOVBSI</span>
            <svg class="item-check" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="dropdown-item" data-value="niv">
            <span class="item-lang">English</span>
            <span class="item-version">NIV</span>
          </div>
          <div class="dropdown-item" data-value="amp">
            <span class="item-lang">English</span>
            <span class="item-version">AMP</span>
          </div>
        </div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="browse">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Browse
      </button>
      <button class="tab-btn" data-tab="search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </button>
    </div>

    <div id="browse-tab" class="tab-content active">
      <div class="select-row">
        <select id="book-select">
          <option value="">Book</option>
        </select>
        <select id="chapter-select" disabled>
          <option value="">Ch</option>
        </select>
        <select id="verse-select" disabled>
          <option value="">V</option>
        </select>
      </div>
      <div id="browse-display" class="verse-display">
        <div class="placeholder-text">Select a verse to view</div>
      </div>
    </div>

    <div id="search-tab" class="tab-content">
      <div class="search-row">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="e.g. John 3:16" autocomplete="off">
      </div>
      <div id="search-display" class="verse-display">
        <div class="placeholder-text">Enter a reference to search</div>
      </div>
    </div>

    <button id="copy-btn" class="copy-btn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
      </svg>
      Copy to Clipboard
    </button>
  </div>

  <div id="toast" class="toast">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    Copied! Press Ctrl+V
  </div>

  <script src="popup.js"></script>
</body>
</html>
